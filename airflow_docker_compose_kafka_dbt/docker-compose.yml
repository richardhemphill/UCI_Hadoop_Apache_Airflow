services:
  airflow-postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-init:
    build: .
    depends_on:
      - airflow-postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: 'airflow_secret_key_for_synchronization'
      DB_HOST: airflow-postgres
      DB_USER: airflow
      DB_PASSWORD: airflow
      DB_NAME: airflow
    user: "50000:0"
    command:
      - bash
      - -c
      - |
        until pg_isready -h airflow-postgres -p 5432 -U airflow; do
          echo 'Waiting for airflow-postgres to be ready...'
          sleep 2
        done &&
        python -c "import psycopg2; conn = psycopg2.connect(host='airflow-postgres', user='airflow', password='airflow', dbname='airflow'); cur = conn.cursor(); cur.execute('CREATE TABLE IF NOT EXISTS raw_sales (user_id integer, event varchar(50), amount integer); CREATE TABLE IF NOT EXISTS raw_profit_events (product_id integer, product_name varchar(100), category varchar(50), year integer, quantity integer, revenue decimal(10, 2), cost decimal(10, 2), profit decimal(10, 2), profit_margin decimal(5, 2));'); conn.commit(); conn.close()" &&
        airflow db migrate &&
        (airflow users create --username admin --firstname admin --lastname admin --role Admin --email admin@example.com --password admin || true)

  airflow-webserver:
    build: .
    depends_on:
      airflow-postgres:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: 'airflow_secret_key_for_synchronization'
      DB_HOST: airflow-postgres
      DB_USER: airflow
      DB_PASSWORD: airflow
      DB_NAME: airflow
    volumes:
      - ./dags:/opt/airflow/dags
      - ../kafka_dbt_project:/opt/airflow/kafka_dbt_project -R 775 /opt/airflow/kafka_dbt_project
    ports:
      - "8081:8080"
    user: "50000:0"
    command: webserver

  airflow-scheduler:
    build: .
    depends_on:
      airflow-postgres:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: 'airflow_secret_key_for_synchronization'
      DB_HOST: airflow-postgres
      DB_USER: airflow
      DB_PASSWORD: airflow
      DB_NAME: airflow
    volumes:
      - ./dags:/opt/airflow/dags
      - ../kafka_dbt_project:/opt/airflow/kafka_dbt_project
    user: "50000:0"
    command: scheduler